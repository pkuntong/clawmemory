version: '3.8'

services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
      - "3210:3210"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_CONVEX_URL=${VITE_CONVEX_URL}
    command: npm run dev

  convex:
    build:
      context: .
      target: base
    ports:
      - "3210:3210"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CONVEX_DEPLOY_KEY=${CONVEX_DEPLOY_KEY}
    command: npx convex dev

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Vector database for embeddings (optional - can use pgvector instead)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  redis_data:
  qdrant_storage:
